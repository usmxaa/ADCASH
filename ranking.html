<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #080a0f; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .rank-card { background: #161b22; transition: 0.3s; border: 1px solid #1f2937; }
        .rank-card:hover { transform: scale(1.02); border-color: #00e676; }
        .top-1-border { border-left: 4px solid #eab308; background: rgba(234, 179, 8, 0.05); }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-md mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter italic">
                <i class="fas fa-crown text-yellow-500 mr-2"></i> TOP <span class="text-[#00e676]">EARNERS</span>
            </h1>
            <a href="dashboard.html" class="h-10 w-10 bg-[#161b22] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>

        <div class="bg-gradient-to-br from-[#161b22] to-[#080a0f] p-6 rounded-[30px] border border-[#00e676]/30 mb-10 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-4">
                <div id="user-avatar-container" class="h-14 w-14 rounded-full border border-[#00e676] overflow-hidden">
                    <img id="my-avatar" src="https://ui-avatars.com/api/?name=User&background=00e676&color=000" alt="Me">
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Your Position</p>
                    <h2 class="text-xl font-black">#<span id="user-rank">...</span></h2>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Balance</p>
                <h2 id="main-balance" class="text-xl font-black text-[#00e676]">$0.000</h2>
            </div>
        </div>

        <div id="leaderboard-list" class="space-y-4">
            <div class="text-center py-10 opacity-20">
                <i class="fas fa-circle-notch animate-spin text-3xl"></i>
            </div>
        </div>

        <p class="text-center text-[10px] text-gray-600 mt-12 font-black uppercase tracking-[4px]">Global Real-time Ranking</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ১. ইউজারের নিজস্ব ডাটা লোড
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const userData = snap.data();
                        document.getElementById('main-balance').innerText = "$" + (userData.balance || 0).toFixed(3);
                        document.getElementById('my-avatar').src = `https://ui-avatars.com/api/?name=${userData.name || 'User'}&background=00e676&color=000`;
                    }
                });
                loadLeaderboard(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadLeaderboard(currentUid) {
            // ২. টপ ১০ ইউজার কুয়েরি
            const q = query(collection(db, "users"), orderBy("balance", "desc"), limit(10));
            const querySnapshot = await getDocs(q);
            const listContainer = document.getElementById('leaderboard-list');
            listContainer.innerHTML = "";
            
            let rank = 1;
            let myRankFound = false;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const isMe = docSnap.id === currentUid;
                if(isMe) {
                    document.getElementById('user-rank').innerText = rank;
                    myRankFound = true;
                }

                const isTop1 = rank === 1;
                const rankColor = isTop1 ? "text-yellow-500" : (rank <= 3 ? "text-[#00e676]" : "text-gray-500");
                const cardClass = isTop1 ? "top-1-border" : "";

                listContainer.innerHTML += `
                    <div class="rank-card ${cardClass} p-5 rounded-2xl flex justify-between items-center ${isMe ? 'ring-1 ring-[#00e676]' : ''}">
                        <div class="flex items-center gap-4">
                            <span class="font-black ${rankColor} text-xl w-8">#${rank}</span>
                            <img src="https://ui-avatars.com/api/?name=${data.name || 'User'}&background=random&color=fff" class="h-10 w-10 rounded-full border border-gray-700">
                            <div>
                                <p class="font-bold text-sm">${data.name || 'Anonymous'}</p>
                                <p class="text-[9px] text-gray-500 uppercase font-black">${data.country || 'Global'}</p>
                            </div>
                        </div>
                        <span class="font-black text-[#00e676] tracking-tighter">$${(data.balance || 0).toFixed(2)}</span>
                    </div>
                `;
                rank++;
            });

            if(!myRankFound) {
                document.getElementById('user-rank').innerText = "10+";
            }
        }
    </script>
</body>
</html>
