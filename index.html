<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdCashGlobal - Log In & Start Earning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'], },
                    colors: {
                        'dark-bg': '#0a0d15',
                        'card-bg': '#1e2632',
                        'primary-green': '#00e676',
                        'input-bg': '#131924',
                        'border-gray': '#313d4f',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #0a0d15; color: white; }
        .card-shadow { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        .neon-btn { transition: 0.3s; position: relative; overflow: hidden; }
        .neon-btn:hover { box-shadow: 0 0 25px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 230, 118, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
        #maintenance-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0d15; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-inter">
    
    <div id="maintenance-screen">
        <div class="h-20 w-20 bg-primary-green/20 rounded-3xl flex items-center justify-center mb-6 border border-primary-green/30">
            <i class="fas fa-tools text-3xl text-primary-green animate-bounce"></i>
        </div>
        <h1 class="text-4xl font-black uppercase italic tracking-tighter text-white">System <span class="text-primary-green">Offline</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[3px] text-xs mt-4">We are updating our servers. Check back soon.</p>
    </div>

    <div class="bg-glow"></div>

    <header class="w-full flex justify-between items-center p-5 px-6 lg:px-12 border-b border-border-gray sticky top-0 bg-dark-bg/80 backdrop-blur-lg z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="h-10 w-10 bg-primary-green rounded-xl flex items-center justify-center">
                <span class="text-black text-2xl font-black italic">A</span>
            </div>
            <span class="text-xl font-black italic uppercase">AdCash<span class="text-primary-green">Global</span></span>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-5 py-12 lg:py-20">
        <div class="w-full max-w-7xl flex flex-col lg:flex-row gap-12 lg:gap-20 items-center">
            
            <div class="flex-1 text-center lg:text-left space-y-8">
                <div class="inline-flex items-center gap-2 bg-primary-green/10 border border-primary-green/20 px-4 py-2 rounded-full mb-4">
                    <span class="flex h-2 w-2 rounded-full bg-primary-green animate-pulse"></span>
                    <span class="text-primary-green text-[10px] font-black uppercase tracking-widest">System Online & Paying</span>
                </div>
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter leading-[0.9] italic uppercase">
                    Earn <span class="text-primary-green">Real Cash</span> <br> Every Day.
                </h1>
                <p class="text-gray-500 font-bold text-lg max-w-lg mx-auto lg:mx-0">
                    Join 1.2M+ users making money daily through tasks, surveys, and spins.
                </p>
            </div>

            <div class="w-full max-w-md bg-card-bg p-8 md:p-10 rounded-[45px] border border-border-gray card-shadow">
                <h2 id="authTitle" class="text-3xl font-black text-center mb-8 italic uppercase tracking-tighter">Login <span class="text-gray-500">Now</span></h2>
                
                <form id="authForm" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-2 tracking-widest text-left block">Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com" class="w-full bg-input-bg p-5 rounded-2xl border border-border-gray text-white font-bold focus:border-primary-green outline-none transition">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-2 tracking-widest text-left block">Password</label>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-input-bg p-5 rounded-2xl border border-border-gray text-white font-bold focus:border-primary-green outline-none transition">
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-primary-green text-black font-black py-5 rounded-2xl text-lg tracking-widest neon-btn uppercase italic shadow-lg">
                        Login Now
                    </button>
                </form>

                <p class="text-center mt-6 text-xs font-bold text-gray-500 uppercase tracking-widest">
                    <span id="toggleText">Don't have an account?</span> 
                    <button id="toggleAuth" class="text-primary-green hover:underline">Create Account</button>
                </p>
            </div>
        </div>
    </main>

    <footer class="w-full p-8 border-t border-border-gray bg-card-bg/30">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-8">
                <div class="text-center md:text-left">
                    <p class="text-primary-green font-black text-2xl leading-none">4.8/5</p>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Trustpilot</p>
                </div>
                <div class="text-center md:text-left">
                    <p class="text-white font-black text-2xl leading-none">1.2M+</p>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Active Users</p>
                </div>
            </div>
            <p class="text-gray-600 text-[10px] font-black uppercase tracking-widest">© 2026 AdCashGlobal</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authForm = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const authTitle = document.getElementById('authTitle');
        const toggleAuth = document.getElementById('toggleAuth');
        const toggleText = document.getElementById('toggleText');
        const maintenanceScreen = document.getElementById('maintenance-screen');

        let isLoginMode = true;

        // ১. রিয়েল-টাইম কমান্ড রিসিভ করা (Maintenance Mode)
        onSnapshot(doc(db, "system", "config"), (snap) => {
            if (snap.exists()) {
                const config = snap.data();
                if (config.maintenance === true) {
                    maintenanceScreen.style.display = 'flex'; // সাইট বন্ধ হবে
                } else {
                    maintenanceScreen.style.display = 'none'; // সাইট চালু হবে
                }
            }
        });

        // ২. লগইন/সাইনআপ সুইচ
        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            authTitle.innerHTML = isLoginMode ? `Login <span class="text-gray-500">Now</span>` : `Create <span class="text-primary-green">Account</span>`;
            submitBtn.innerText = isLoginMode ? "Login Now" : "Sign Up Now";
            toggleText.innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
            toggleAuth.innerText = isLoginMode ? "Create Account" : "Login Here";
        });

        // ৩. অটো লগইন চেক
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "dashboard.html";
        });

        // ৪. ফর্ম সাবমিট (Login & Signup logic)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.innerText = "PROCESSING...";
            submitBtn.disabled = true;

            try {
                if (isLoginMode) {
                    // LOGIN PROCESS
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    // SIGNUP PROCESS
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // অ্যাডমিন প্যানেল থেকে সেট করা বোনাস ডাটা রিড করা (system/config থেকে)
                    const configSnap = await getDoc(doc(db, "system", "config"));
                    const bonus = configSnap.exists() ? parseFloat(configSnap.data().dailyBonus) : 0.005;

                    // নতুন ইউজারের প্রোফাইল তৈরি
                    await setDoc(doc(db, "users", cred.user.uid), {
                        uid: cred.user.uid,
                        email: email,
                        name: email.split('@')[0],
                        balance: bonus, // অ্যাডমিন যা সেট করেছে সেই বোনাস
                        role: "user",
                        dateJoined: new Date().toLocaleDateString()
                    });
                    
                    alert(`Signup Success! You got $${bonus} bonus.`);
                    window.location.href = "dashboard.html";
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLoginMode ? "Login Now" : "Sign Up Now";
            }
        });
    </script>
</body>
</html>
