<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Code | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0d15; color: white; font-family: 'Inter', sans-serif; }
        .promo-input:focus { border-color: #00e676; box-shadow: 0 0 20px rgba(0, 230, 118, 0.1); }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">
        <a href="dashboard.html" class="absolute top-10 left-6 h-12 w-12 bg-[#1e2632] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
            <i class="fas fa-arrow-left"></i>
        </a>

        <header class="text-center mb-10">
            <div class="h-20 w-20 bg-[#00e676]/10 rounded-3xl flex items-center justify-center mx-auto mb-6 animate-bounce-slow border border-[#00e676]/20">
                <i class="fas fa-ticket-alt text-[#00e676] text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black uppercase tracking-tighter italic">Promo <span class="text-gray-500">Center</span></h1>
            <p class="text-[10px] text-[#00e676] font-black uppercase tracking-[4px] mt-2">Claim Your Bonus Rewards</p>
        </header>

        <div class="bg-[#1e2632] p-8 md:p-10 rounded-[50px] border border-gray-800 shadow-2xl relative">
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#00e676] text-black px-6 py-1 rounded-full text-[10px] font-black uppercase">
                Balance: <span id="main-balance">$0.000</span>
            </div>

            <p class="text-sm text-gray-400 mb-8 text-center leading-relaxed">Join our Telegram or follow our Socials to find secret codes. Each code gives a unique bonus!</p>
            
            <div class="space-y-4">
                <input type="text" id="promo-input" placeholder="ENTER CODE HERE" 
                    class="w-full bg-black/40 p-6 rounded-3xl border border-gray-700 text-center font-black tracking-[5px] text-[#00e676] outline-none transition-all promo-input uppercase">
                
                <button id="redeemBtn" class="w-full bg-white text-black font-black py-5 rounded-3xl uppercase tracking-widest hover:bg-[#00e676] hover:scale-[1.02] active:scale-95 transition-all shadow-lg">
                    Redeem Reward
                </button>
            </div>

            <div class="mt-10 flex justify-center gap-6 opacity-50">
                <i class="fab fa-telegram text-2xl hover:text-[#00e676] cursor-pointer"></i>
                <i class="fab fa-youtube text-2xl hover:text-[#00e676] cursor-pointer"></i>
                <i class="fab fa-twitter text-2xl hover:text-[#00e676] cursor-pointer"></i>
            </div>
        </div>

        <p class="text-center text-[10px] text-gray-600 mt-12 font-black uppercase tracking-[3px]">One-time use per code</p>
    </div>

    <div id="promoModal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden p-6 backdrop-blur-md">
        <div class="bg-[#1e2632] p-10 rounded-[45px] border border-[#00e676] text-center w-full max-w-sm">
            <div id="modalIcon" class="h-24 w-24 bg-[#00e676]/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-gift text-5xl text-[#00e676]"></i>
            </div>
            <h1 id="modalTitle" class="text-3xl font-black mb-2 italic">Awesome!</h1>
            <p id="promo-msg" class="text-gray-400 text-sm mb-8 font-bold uppercase tracking-widest"></p>
            <button onclick="closePromoModal()" class="w-full bg-[#00e676] text-black font-black py-5 rounded-2xl shadow-xl">GREAT!</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // লাইভ ব্যালেন্স আপডেট
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        document.getElementById('main-balance').innerText = "$" + (snap.data().balance || 0).toFixed(3);
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById('redeemBtn').onclick = async () => {
            const codeInput = document.getElementById('promo-input').value.trim().toUpperCase();
            if (!codeInput) return alert("Enter a code first!");

            const btn = document.getElementById('redeemBtn');
            btn.disabled = true;
            btn.innerText = "CHECKING...";

            try {
                // ১. প্রমো কোড ডাটাবেস থেকে চেক করা
                const promoRef = doc(db, "promo_codes", codeInput);
                const promoSnap = await getDoc(promoRef);

                if (!promoSnap.exists()) {
                    showError("Invalid Code!", "This promo code does not exist.");
                } else {
                    const promoData = promoSnap.data();
                    const userRef = doc(db, "users", currentUser.uid);
                    const userSnap = await getDoc(userRef);
                    const usedCodes = userSnap.data().usedPromos || [];

                    // ২. ইউজার আগে ব্যবহার করেছে কিনা চেক
                    if (usedCodes.includes(codeInput)) {
                        showError("Already Used!", "You have already claimed this bonus.");
                    } else {
                        // ৩. ব্যালেন্স আপডেট এবং কোড মার্ক করা
                        await updateDoc(userRef, {
                            balance: increment(promoData.reward),
                            usedPromos: arrayUnion(codeInput)
                        });
                        showSuccess("Success!", `You received $${promoData.reward.toFixed(3)} bonus!`);
                        document.getElementById('promo-input').value = "";
                    }
                }
            } catch (error) {
                console.error(error);
                alert("Something went wrong!");
            }
            btn.disabled = false;
            btn.innerText = "Redeem Reward";
        };

        function showSuccess(title, msg) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('promo-msg').innerText = msg;
            document.getElementById('modalIcon').innerHTML = '<i class="fas fa-gift text-5xl text-[#00e676]"></i>';
            document.getElementById('promoModal').classList.remove('hidden');
        }

        function showError(title, msg) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('promo-msg').innerText = msg;
            document.getElementById('modalIcon').innerHTML = '<i class="fas fa-times-circle text-5xl text-red-500"></i>';
            document.getElementById('promoModal').classList.remove('hidden');
        }

        window.closePromoModal = () => document.getElementById('promoModal').classList.add('hidden');

    </script>
</body>
</html>
