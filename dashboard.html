<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        .sidebar-item:hover { background-color: #161b22; color: #00e676; border-right: 4px solid #00e676; }
        .sidebar-item.active { background-color: #161b22; color: #00e676; border-right: 4px solid #00e676; }
        .card-bg { background: linear-gradient(145deg, #161b22, #1c2128); border: 1px solid #30363d; }
        .neon-text { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
        .neon-btn { background-color: #00e676; color: #000; transition: 0.3s; cursor: pointer; font-weight: 900; }
        .neon-btn:hover { box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        
        #maintenance-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div id="maintenance-overlay">
        <i class="fas fa-tools text-5xl text-[#00e676] animate-bounce mb-4"></i>
        <h2 class="text-2xl font-bold italic uppercase">Maintenance Mode</h2>
        <p class="text-gray-500 text-sm mt-2">Updating servers for better speed!</p>
    </div>

    <nav class="w-full md:w-64 card-bg flex flex-col p-6 space-y-6 md:sticky md:top-0 md:h-screen z-50">
        <div class="text-2xl font-black flex items-center gap-2 mb-8 italic uppercase tracking-tighter">
            <span class="neon-text"><i class="fas fa-bolt"></i></span> AdCash<span class="text-[#00e676]">Global</span>
        </div>
        
        <div class="flex flex-col space-y-2 flex-1">
            <a href="dashboard.html" class="sidebar-item active p-3 rounded-xl flex items-center gap-3 transition-all font-bold text-sm">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="tasks.html" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-tasks w-5"></i> All Tasks
            </a>
            <a href="wallet.html" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-wallet w-5"></i> Wallet
            </a>
            <button onclick="logoutUser()" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-red-500 font-bold text-sm text-left mt-4">
                <i class="fas fa-sign-out-alt w-5"></i> Logout
            </button>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <div class="flex items-center gap-3 p-2">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=00e676&color=000" class="rounded-full h-10 w-10 border-2 border-[#00e676]">
                <div class="overflow-hidden">
                    <p id="userNameDisplay" class="text-sm font-black truncate">Loading...</p>
                    <p class="text-[9px] text-[#00e676] font-black uppercase tracking-widest">Active Member</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 space-y-10">
        
        <header class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center relative overflow-hidden group">
                <div class="relative z-10">
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Main Balance</p>
                    <h2 id="balanceDisplay" class="text-5xl font-black neon-text italic">$0.0000</h2>
                </div>
                <div class="h-12 w-12 bg-[#00e676]/10 text-[#00e676] rounded-xl flex items-center justify-center">
                    <i class="fas fa-wallet text-xl"></i>
                </div>
            </div>

            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center">
                <div>
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Today's Profit</p>
                    <h2 id="todayEarnDisplay" class="text-5xl font-black italic">$0.0000</h2>
                </div>
                <div class="bg-blue-500/10 p-4 rounded-2xl"><i class="fas fa-chart-line text-blue-500 text-xl"></i></div>
            </div>
        </header>

        <section>
            <h3 class="text-xl font-black uppercase italic mb-6">Earn <span class="text-[#00e676]">Money</span></h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="location.href='spin.html'" class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <i class="fas fa-dharmachakra text-yellow-500 text-4xl mb-4 group-hover:rotate-180 transition-transform duration-700"></i>
                    <h4 class="font-black uppercase italic">Lucky Spin</h4>
                    <p class="text-gray-500 text-[10px] mb-6">Win up to $1.00</p>
                    <span class="neon-btn block py-3 rounded-xl text-[10px] uppercase">Spin Now</span>
                </div>
                
                <div onclick="location.href='video.html'" class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <i class="fas fa-play-circle text-red-500 text-4xl mb-4 group-hover:scale-110 transition-transform"></i>
                    <h4 class="font-black uppercase italic">Watch Ads</h4>
                    <p class="text-gray-500 text-[10px] mb-6">Earn $0.005/Ad</p>
                    <span class="neon-btn block py-3 rounded-xl text-[10px] uppercase">Watch Now</span>
                </div>

                <div onclick="location.href='refer.html'" class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <i class="fas fa-users text-cyan-500 text-4xl mb-4"></i>
                    <h4 class="font-black uppercase italic">Referral</h4>
                    <p class="text-gray-500 text-[10px] mb-6">Get 10% Bonus</p>
                    <span class="neon-btn block py-3 rounded-xl text-[10px] uppercase">Invite</span>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // লগআউট ফাংশন
        window.logoutUser = () => {
            if(confirm("Logout from AdCashGlobal?")) {
                signOut(auth).then(() => window.location.href = "index.html");
            }
        };

        // মেইনটেন্যান্স চেক
        onSnapshot(doc(db, "system", "config"), (snap) => {
            if (snap.exists() && snap.data().maintenance) {
                document.getElementById('maintenance-overlay').style.display = 'flex';
            } else {
                document.getElementById('maintenance-overlay').style.display = 'none';
            }
        });

        // ইউজার ডাটা হ্যান্ডলিং
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                
                onSnapshot(userRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        
                        // ব্যালেন্স লজিক: বড় হাতের 'Balance' বা ছোট হাতের 'balance' যাই থাকুক
                        const finalBalance = data.Balance || data.balance || 0;
                        const finalToday = data.TodayEarnings || data.todayEarnings || 0;
                        const name = data.name || data.email.split('@')[0];

                        // UI আপডেট
                        document.getElementById('balanceDisplay').innerText = `$${parseFloat(finalBalance).toFixed(4)}`;
                        document.getElementById('todayEarnDisplay').innerText = `$${parseFloat(finalToday).toFixed(4)}`;
                        document.getElementById('userNameDisplay').innerText = name;
                        document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${name}&background=00e676&color=000&bold=true`;
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
