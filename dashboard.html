<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
        authDomain: "adcashglobal-efb58.firebaseapp.com",
        projectId: "adcashglobal-efb58",
        storageBucket: "adcashglobal-efb58.firebasestorage.app",
        messagingSenderId: "749601861677",
        appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // গ্লোবাল লগআউট ফাংশন
    window.logoutUser = () => {
        if(confirm("Do you want to logout?")) {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        }
    };

    // ১. মেইনটেন্যান্স চেক (আপনার অ্যাডমিন প্যানেলের 'system/config' পাথের সাথে মিল রেখে)
    const settingsRef = doc(db, "system", "config");
    onSnapshot(settingsRef, (snap) => {
        if (snap.exists()) {
            const config = snap.data();
            // অ্যাডমিন প্যানেলে 'maintenance' কি ব্যবহার করা হয়েছে
            if (config.maintenance === true) {
                document.getElementById('maintenance-overlay').style.display = 'flex';
            } else {
                document.getElementById('maintenance-overlay').style.display = 'none';
            }
        }
    });

    // ২. অথেনটিকেশন এবং ইউজার ডাটা (Balance) আপডেট
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // ইউজারের প্রোফাইল ডাটা রিড করা
            const userRef = doc(db, "users", user.uid);
            
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    
                    // নাম আপডেট
                    const name = data.name || data.email.split('@')[0];
                    document.getElementById('userNameDisplay').innerText = name;
                    
                    // মেইন ব্যালেন্স আপডেট (Registration এ 'balance' কি ব্যবহার করা হয়েছে)
                    const balance = parseFloat(data.balance || 0);
                    document.getElementById('balanceDisplay').innerText = `$${balance.toFixed(4)}`;
                    
                    // আজকের ইনকাম আপডেট
                    const todayEarn = parseFloat(data.todayEarnings || 0);
                    document.getElementById('todayEarnDisplay').innerText = `$${todayEarn.toFixed(4)}`;
                    
                    // অবতার আপডেট
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=00e676&color=000&bold=true`;
                    
                } else {
                    console.error("Firestore-এ ইউজারের কোনো ডাটা খুঁজে পাওয়া যায়নি!");
                    // যদি ডাটা না থাকে তবে ইউজারকে তৈরি করতে বলা হতে পারে অথবা লগআউট
                }
            }, (error) => {
                console.error("Data load error:", error);
            });
        } else {
            // লগইন করা না থাকলে হোম পেজে পাঠিয়ে দাও
            window.location.href = "index.html";
        }
    });
</script>
