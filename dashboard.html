<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        .sidebar-item:hover { background-color: #161b22; color: #00e676; border-right: 4px solid #00e676; }
        .sidebar-item.active { background-color: #161b22; color: #00e676; border-right: 4px solid #00e676; }
        .card-bg { background: linear-gradient(145deg, #161b22, #1c2128); border: 1px solid #30363d; }
        .neon-text { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
        .neon-btn { background-color: #00e676; color: #000; transition: 0.3s; cursor: pointer; }
        .neon-btn:hover { box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        #maintenance-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div id="maintenance-overlay">
        <i class="fas fa-tools text-5xl text-[#00e676] animate-bounce mb-4"></i>
        <h2 class="text-2xl font-bold italic uppercase">Maintenance Mode</h2>
        <p class="text-gray-500 text-sm mt-2">Updating servers...</p>
    </div>

    <nav class="w-full md:w-64 card-bg flex flex-col p-6 space-y-6 md:sticky md:top-0 md:h-screen z-50">
        <div class="text-2xl font-black flex items-center gap-2 mb-8 italic uppercase tracking-tighter">
            <span class="neon-text"><i class="fas fa-bolt"></i></span> AdCash<span class="text-[#00e676]">Global</span>
        </div>
        
        <div class="flex flex-col space-y-2 flex-1">
            <a href="dashboard.html" class="sidebar-item active p-3 rounded-xl flex items-center gap-3 transition-all font-bold text-sm">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="offers.html" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-fire w-5 text-orange-500"></i> Premium Offers
            </a>
            <a href="tasks.html" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-tasks w-5"></i> All Tasks
            </a>
            <a href="refer.html" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-users w-5"></i> Refer & Earn
            </a>
            <a href="wallet.html" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-wallet w-5"></i> Wallet
            </a>
            <button onclick="logoutUser()" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-red-500 font-bold text-sm text-left mt-4">
                <i class="fas fa-sign-out-alt w-5"></i> Logout
            </button>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <div onclick="location.href='profile.html'" class="flex items-center gap-3 cursor-pointer group p-2 hover:bg-white/5 rounded-2xl transition-all">
                <div class="relative">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=00e676&color=000" class="rounded-full h-10 w-10 border-2 border-transparent group-hover:border-[#00e676] transition-all">
                    <div class="absolute bottom-0 right-0 h-3 w-3 bg-[#00e676] border-2 border-[#0a0d15] rounded-full"></div>
                </div>
                <div class="overflow-hidden">
                    <p id="userNameDisplay" class="text-sm font-black group-hover:text-[#00e676] transition-colors truncate">Loading...</p>
                    <p class="text-[9px] text-[#00e676] font-black uppercase tracking-widest">Active Member</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 space-y-10 overflow-y-auto">
        <header class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-110 transition-transform">
                    <i class="fas fa-wallet text-6xl"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Main Balance</p>
                    <h2 id="balanceDisplay" class="text-4xl font-black neon-text italic">$0.0000</h2>
                </div>
                <button onclick="location.href='wallet.html'" class="h-10 w-10 bg-white/5 rounded-xl flex items-center justify-center hover:bg-[#00e676] hover:text-black transition-all">
                    <i class="fas fa-plus text-xs"></i>
                </button>
            </div>

            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center border-b-4 border-blue-500/30">
                <div>
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Today's Profit</p>
                    <h2 id="todayEarnDisplay" class="text-4xl font-black italic">$0.0000</h2>
                </div>
                <div class="bg-blue-500/10 p-4 rounded-2xl"><i class="fas fa-bolt text-blue-500 text-xl"></i></div>
            </div>

            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center border-b-4 border-purple-500/30">
                <div>
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Global Active</p>
                    <h2 class="text-4xl font-black italic">14,285</h2>
                </div>
                <div class="bg-purple-500/10 p-4 rounded-2xl animate-pulse"><i class="fas fa-circle text-purple-500 text-[10px]"></i></div>
            </div>
        </header>

        <section>
            <h3 class="text-2xl font-black uppercase italic tracking-tighter mb-8">Fast <span class="text-[#00e676]">Earnings</span></h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="location.href='video.html'" class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <i class="fas fa-play text-red-500 text-3xl mb-4"></i>
                    <h4 class="text-xl font-black uppercase italic">Watch Ads</h4>
                    <span class="neon-btn block mt-4 py-3 rounded-2xl text-[10px] uppercase tracking-widest">Start</span>
                </div>
                <div onclick="location.href='spin.html'" class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <i class="fas fa-dharmachakra text-yellow-500 text-3xl mb-4"></i>
                    <h4 class="text-xl font-black uppercase italic">Lucky Spin</h4>
                    <span class="neon-btn block mt-4 py-3 rounded-2xl text-[10px] uppercase tracking-widest">Spin</span>
                </div>
                <div onclick="location.href='bonus.html'" class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <i class="fas fa-gift text-cyan-500 text-3xl mb-4"></i>
                    <h4 class="text-xl font-black uppercase italic">Daily Gift</h4>
                    <span class="neon-btn block mt-4 py-3 rounded-2xl text-[10px] uppercase tracking-widest">Claim</span>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.logoutUser = () => {
            if(confirm("Logout?")) signOut(auth).then(() => window.location.href = "index.html");
        };

        // Maintenance Check
        onSnapshot(doc(db, "system", "config"), (snap) => {
            if (snap.exists()) {
                document.getElementById('maintenance-overlay').style.display = snap.data().maintenance ? 'flex' : 'none';
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Logged in UID:", user.uid);
                
                // Debug: Check user data in Console
                const userRef = doc(db, "users", user.uid);
                
                onSnapshot(userRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        console.log("Database Data Received:", data); // F12 চেপে এখানে ডাটা চেক করুন

                        // একাধিক সম্ভাব্য ফিল্ড চেক করা হচ্ছে
                        const bal = data.balance ?? data.Balance ?? data.wallet ?? 0;
                        const earn = data.todayEarnings ?? data.TodayEarnings ?? 0;
                        const name = data.name ?? data.Name ?? user.email.split('@')[0];

                        // UI Update
                        document.getElementById('balanceDisplay').innerText = `$${parseFloat(bal).toFixed(4)}`;
                        document.getElementById('todayEarnDisplay').innerText = `$${parseFloat(earn).toFixed(4)}`;
                        document.getElementById('userNameDisplay').innerText = name;
                        document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=00e676&color=000&bold=true`;
                    } else {
                        console.error("No Firestore document found for UID:", user.uid);
                        document.getElementById('userNameDisplay').innerText = "Data Missing";
                    }
                }, (error) => {
                    console.error("Firestore Error:", error.message);
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
